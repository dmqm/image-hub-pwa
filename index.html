  </head>
  <body>
    <div id="root"></div>
    
    <!-- Register Service Worker -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          // Detect base path dynamically to handle GitHub Pages sub-paths
          const basePath = window.location.pathname.endsWith('/') 
            ? window.location.pathname 
            : window.location.pathname.substring(0, window.location.pathname.lastIndexOf('/') + 1);
          
          navigator.serviceWorker.register(`${basePath}sw.js`)
            .then((registration) => {
              console.log('ServiceWorker registered successfully with scope: ', registration.scope);
              
              // Check for updates periodically or on reload
              registration.onupdatefound = () => {
                const installingWorker = registration.installing;
                if (installingWorker) {
                  installingWorker.onstatechange = () => {
                    if (installingWorker.state === 'installed') {
                      if (navigator.serviceWorker.controller) {
                        console.log('[PWA] New version installed, waiting to activate...');
                      } else {
                        console.log('[PWA] Content is cached for offline use.');
                      }
                    }
                  };
                }
              };
            })
            .catch((err) => {
              console.error('ServiceWorker registration failed: ', err);
            });
        });

        // Automatically reload when a new service worker takes control
        let refreshing = false;
        navigator.serviceWorker.addEventListener('controllerchange', () => {
          if (!refreshing) {
            refreshing = true;
            console.log('[PWA] New controller active. Reloading page...');
            window.location.reload();
          }
        });
      }
    </script>
  </body>
